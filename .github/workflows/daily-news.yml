name: Fetch and Summarize Finance News

on:
  schedule:
    # Run twice daily - scheduled at off-peak minutes to avoid GitHub Actions queue delays
    - cron: '17 1 * * *'    # ~6:47 AM IST
    - cron: '17 13 * * *'   # ~6:47 PM IST
  workflow_dispatch: {}     # Manual trigger for testing

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch and summarize news
        run: python scripts/fetch_and_summarize.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
